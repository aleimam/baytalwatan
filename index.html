<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بيت الوطن — أراضي المرحلة الحادية عشر</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Kufi+Arabic:wght@500;700;800&family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css?v=16">
</head>
<body>
<!-- ============ REGISTRATION / LOGIN GATE ============ -->
<div id="authGate" class="auth-gate">
  <div class="auth-card">
    <div class="auth-lang" id="authLang">
      <button type="button" data-setlang="ar">العربية</button>
      <button type="button" data-setlang="en">English</button>
    </div>
    <div class="auth-brand">
      <span class="logo-badge big"><img src="assets/icon.png" alt="بيت الوطن"></span>
      <h2>بيت الوطن</h2>
      <p data-i18n="g_tagline"></p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab on" data-form="login" type="button" data-i18n="g_login"></button>
      <button class="auth-tab" data-form="register" type="button" data-i18n="g_register"></button>
    </div>
    <form id="loginForm" class="auth-form">
      <label><span data-i18n="g_email"></span><input type="email" name="email" autocomplete="email" required></label>
      <label><span data-i18n="g_password"></span><input type="password" name="password" autocomplete="current-password" required></label>
      <div class="auth-err" id="loginErr"></div>
      <button type="submit" class="auth-submit" data-i18n="g_login_btn"></button>
    </form>
    <form id="registerForm" class="auth-form" hidden>
      <label><span data-i18n="g_name"></span><input type="text" name="full_name" autocomplete="name" required></label>
      <label><span data-i18n="g_email"></span><input type="email" name="email" autocomplete="email" required></label>
      <label><span data-i18n="g_phone"></span><input type="tel" name="phone" autocomplete="tel" placeholder="01xxxxxxxxx" required></label>
      <label><span data-i18n="g_password"></span><input type="password" name="password" autocomplete="new-password" minlength="6" required></label>
      <div class="auth-err" id="registerErr"></div>
      <button type="submit" class="auth-submit" data-i18n="g_register_btn"></button>
    </form>
  </div>
</div>

<header class="appbar">
  <div class="wrap bar">
    <div class="brand">
      <span class="logo-badge"><img src="assets/icon.png" alt="شعار بيت الوطن"></span>
      <div>
        <h1 id="siteTitle">بيت الوطن</h1>
        <div class="sub" id="siteSub" data-i18n="brand_sub"></div>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab on" data-view="list" data-i18n="tab_list"></button>
      <button class="tab" data-view="analytics" data-i18n="tab_analytics"></button>
      <button class="tab" data-view="premium" data-i18n="tab_premium"></button>
      <button class="tab" data-view="terms" data-i18n="tab_terms"></button>
      <button class="tab" data-view="wish" data-i18n="tab_wish"></button>
      <button class="tab admin-only" data-view="admin" data-i18n="tab_admin" hidden></button>
      <span class="user-area" id="userArea" hidden><span class="user-name" id="userName"></span><button class="btn ghost" id="logoutBtn" data-i18n="logout"></button></span>
      <button class="btn ghost" id="langBtn" title="Language / اللغة">EN</button>
      <button class="btn ghost" id="themeBtn" data-i18n-title="theme">🌙</button>
    </nav>
  </div>
</header>

<!-- ============ LIST + MAP VIEW ============ -->
<!-- ============ GLOBAL FILTER BAR (applies to every view) ============ -->
<div class="wrap"><section class="filters card" id="filterBar">
  <div class="frow">
    <div class="fg city-dd">
      <label data-i18n="f_city"></label>
      <button type="button" class="dd-btn" id="cityBtn"><span id="cityBtnTxt"></span><span>▾</span></button>
      <div class="dd-panel" id="cityPanel">
        <div class="dd-actions"><a id="cityAll" data-i18n="sel_all"></a><a id="cityNone" data-i18n="sel_none"></a></div>
        <div id="cityList"></div>
      </div>
    </div>
    <div class="fg area-fg"><label data-i18n="f_district"></label><select id="areaSel"></select></div>
    <div class="fg"><label data-i18n="f_perm"></label><div class="mm"><input type="number" id="pMin" data-i18n-ph="from"><span>–</span><input type="number" id="pMax" data-i18n-ph="to"></div></div>
    <div class="fg"><label data-i18n="f_area"></label><div class="mm"><input type="number" id="aMin" data-i18n-ph="from"><span>–</span><input type="number" id="aMax" data-i18n-ph="to"></div></div>
    <div class="fg"><label data-i18n="f_total"></label><div class="mm"><input type="number" id="tMin" data-i18n-ph="from"><span>–</span><input type="number" id="tMax" data-i18n-ph="to"></div></div>
    <div class="fg"><label data-i18n="f_down"></label><div class="mm"><input type="number" id="dMin" data-i18n-ph="from"><span>–</span><input type="number" id="dMax" data-i18n-ph="to"></div></div>
    <div class="fg"><label data-i18n="f_premium"></label>
      <select id="premSel"><option value="" data-i18n="p_all"></option><option value="any" data-i18n="p_any"></option><option value="none" data-i18n="p_none"></option><option value="corner" data-i18n="p_corner"></option><option value="garden" data-i18n="p_garden"></option><option value="sea" data-i18n="p_sea"></option></select>
    </div>
    <div class="fg grow"><label data-i18n="f_search"></label><input type="text" id="searchBox" data-i18n-ph="search_ph"></div>
    <div class="fg"><label>&nbsp;</label><button class="btn" id="resetBtn" data-i18n="reset"></button></div>
  </div>
  <div class="frow sub-row">
    <span class="count-pill" id="countPill">…</span>
    <span class="chips" id="filterChips"></span>
    <span class="spacer"></span>
    <span class="list-only inline-controls">
      <label class="inline"><span data-i18n="sort_by"></span> <select id="sortSel"></select></label>
      <button class="btn ghost" id="dirBtn"></button>
      <label class="inline"><span data-i18n="per_page"></span> <select id="perSel"><option>25</option><option selected>50</option><option>100</option><option>200</option></select></label>
      <span class="col-dd"><button type="button" class="btn ghost" id="colBtn">⚙ <span data-i18n="columns"></span> ▾</button><div class="dd-panel" id="colPanel"><div id="colList"></div></div></span>
    </span>
    <button class="btn" id="exportBtn" data-i18n="export_csv"></button>
  </div>
</section></div>

<!-- ============ LIST + MAP VIEW ============ -->
<main id="view-list" class="wrap view">
  <section class="card tablecard">
    <div class="tbl-wrap"><table class="data" id="tbl"><thead></thead><tbody></tbody></table></div>
    <div class="pager" id="pager"></div>
  </section>
</main>

<!-- ============ ANALYTICS VIEW ============ -->
<main id="view-analytics" class="wrap view" hidden>
  <div class="hint" id="anFilterHint"></div>
  <section class="kpis" id="kpis"></section>
  <div class="agrid">
    <div class="card a8"><div class="ch-head"><h3 data-i18n="c_breakdown"></h3>
      <label class="inline"><span data-i18n="breakdown_by"></span> <select id="bdDim"></select></label>
      <div class="seg" id="cityMetric"><button class="on" data-m="count" data-i18n="m_count"></button><button data-m="value" data-i18n="m_value"></button><button data-m="area" data-i18n="m_area"></button><button data-m="avgM" data-i18n="m_avgm"></button><button data-m="avgDown" data-i18n="m_avgdown"></button></div></div>
      <div class="drill-crumb" id="drillCrumb" style="display:none"></div>
      <div class="chart tall" id="cByCity"></div>
      <div class="bd-hint">↳ <span data-i18n="drill_hint"></span></div></div>
    <div class="card a4"><h3 data-i18n="c_segments"></h3><div class="chart tall" id="cSeg"></div><div class="bd-hint">↳ <span data-i18n="click_to_filter"></span></div></div>
    <div class="card a7"><h3 data-i18n="c_tree"></h3><div class="chart tall" id="cTree"></div></div>
    <div class="card a5"><h3 data-i18n="c_prem"></h3><div class="chart tall" id="cPrem"></div><div class="bd-hint">↳ <span data-i18n="click_to_filter"></span></div></div>
    <div class="card a7"><h3 data-i18n="c_scatter"></h3><div class="chart tall" id="cScatter"></div><div class="bd-hint">↳ <span data-i18n="click_map_hint"></span></div></div>
    <div class="card a5"><h3 data-i18n="c_histp"></h3><div class="chart" id="cHistP"></div></div>
    <div class="card a7"><h3 data-i18n="c_box"></h3><div class="chart tall" id="cBox"></div></div>
    <div class="card a5"><h3 data-i18n="c_hista"></h3><div class="chart" id="cHistA"></div></div>
    <div class="card a12"><div class="ch-head"><h3 data-i18n="bd_table"></h3><span class="bd-sub" id="bdTableSub"></span></div><div class="tbl-wrap" id="bdTable"></div></div>
  </div>
</main>

<!-- ============ PREMIUM PLOTS VIEW (القطع المتميزة) ============ -->
<main id="view-premium" class="wrap view" hidden>
  <div class="hint"><span id="prHint"></span> <span data-i18n="pr_intro"></span></div>
  <section class="kpis" id="prKpis"></section>
  <div class="agrid">
    <div class="card a4"><h3 data-i18n="pr_c_bytype"></h3><div class="chart tall" id="prByType"></div><div class="bd-hint">↳ <span data-i18n="click_to_filter"></span></div></div>
    <div class="card a8"><h3 data-i18n="pr_c_bycity"></h3><div class="chart tall" id="prByCity"></div><div class="bd-hint">↳ <span data-i18n="click_to_filter"></span></div></div>
    <div class="card a5"><h3 data-i18n="pr_c_count"></h3><div class="chart" id="prCount"></div><div class="bd-hint">↳ <span data-i18n="click_to_filter"></span></div></div>
    <div class="card a7"><h3 data-i18n="pr_c_uplift"></h3><div class="chart" id="prUplift"></div></div>
    <div class="card a12"><h3 data-i18n="pr_top"></h3><div id="prTop"></div></div>
  </div>
</main>

<!-- ============ TERMS VIEW (الشروط والاشتراطات) ============ -->
<main id="view-terms" class="wrap view" hidden>
  <h2 class="section-title" data-i18n="tab_terms"></h2>
  <div id="termsBody"></div>
</main>

<!-- ============ WISHLISTS VIEW (المفضلة) ============ -->
<main id="view-wish" class="wrap view" hidden>
  <div id="wishBody"></div>
</main>

<!-- ============ ADMIN VIEW (الإدارة) ============ -->
<main id="view-admin" class="wrap view" hidden>
  <h2 class="section-title" data-i18n="ad_title"></h2>
  <div class="seg admin-seg" id="adminSeg" style="margin:6px 0 14px">
    <button class="on" data-atab="users" data-i18n="ad_tab_users"></button>
    <button data-atab="visitors" data-i18n="ad_tab_visitors"></button>
    <button data-atab="wishlists" data-i18n="ad_tab_wishlists"></button>
    <button data-atab="appear" data-i18n="ad_tab_appear"></button>
    <button data-atab="features" data-i18n="ad_tab_features"></button>
  </div>
  <div id="adminBody"></div>
</main>

<!-- ============ SHARED WISHLIST VIEW (قائمة مشتركة) ============ -->
<main id="view-shared" class="wrap view" hidden>
  <div id="sharedBody"></div>
</main>

<!-- ============ MAP MODAL ============ -->
<div id="mapModal" class="modal" hidden>
  <div class="modal-bg" data-close></div>
  <div class="modal-box">
    <div class="modal-head">
      <div><h3 id="mTitle">—</h3><div class="msub" id="mSub">—</div></div>
      <div class="mtools">
        <a class="btn ghost" id="mOpen" target="_blank" rel="noopener" data-i18n-title="m_open">↗</a>
        <button class="btn" data-close data-i18n-title="m_close">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="viewer" id="viewer"><img id="mImg" alt="map" draggable="false">
        <div class="map-zoom" id="mapZoom">
          <button class="mz-btn" id="mZoomIn" data-i18n-title="m_zoom_in" aria-label="zoom in">＋</button>
          <button class="mz-btn" id="mZoomOut" data-i18n-title="m_zoom_out" aria-label="zoom out">−</button>
          <button class="mz-btn mz-fit" id="mReset" data-i18n-title="m_fit" aria-label="fit">⤢</button>
        </div>
        <div class="viewer-hint" id="mHint"></div></div>
      <aside class="plot-info" id="plotInfo"></aside>
    </div>
  </div>
</div>

<footer class="wrap foot" id="foot"></footer>

<script src="assets/data.js?d=1"></script>
<script src="assets/i18n.js?v=15"></script>
<script src="assets/echarts.min.js"></script>
<script src="assets/analytics.js?v=6"></script>
<script src="assets/admin.js?v=10"></script>
<script src="assets/terms.js?v=1"></script>
<script src="assets/wish.js?v=4"></script>
<script src="assets/app.js?v=19"></script>
<script src="assets/track.js?v=1"></script>
</body>
</html>
